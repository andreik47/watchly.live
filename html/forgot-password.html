<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watchly - Forgot Password</title>
  <link rel="stylesheet" href="../css/index.css">
</head>
<body class="login-body">
  <main class="login-page">
    <section class="login-card" aria-labelledby="forgot-title">
      <div class="login-heading">
        <h1 id="forgot-title">Forgot Password</h1>
        <p>Enter your email to recover your account</p>
      </div>

      <form class="login-form" id="forgotPasswordForm">
        <label class="login-field">
          <span>Email</span>
          <input id="forgotEmail" type="email" placeholder="Enter your email" autocomplete="email">
        </label>

        <button class="login-submit" type="submit">Recover Password</button>
      </form>

      <p class="signup-copy">
        <a href="../html/login.html">Back to Login</a>
      </p>
    </section>
  </main>

  <script src="../js/forgot-password.js"></script>
</body>
</html>
